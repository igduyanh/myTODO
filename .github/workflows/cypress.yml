name: Cypress Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          # Thư mục chứa mã nguồn frontend
          working-directory: frontend
          # Khởi động dev server để match với baseUrl (5173) cấu hình trong cypress.config.js
          start: npm run dev
          # Đợi server lên ở cổng 5173
          wait-on: 'http://localhost:5173'
          wait-on-timeout: 120
          
      - name: Cypress Component Tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          # Bỏ qua bước install vì đã install ở step trên
          install: false
          # Chạy script component test thay vì e2e
          command: npm run cypress:component
